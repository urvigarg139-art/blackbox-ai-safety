<!DOCTYPE html>
<html>
<head>
    <title>AI Security Assistant</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="main-container">

    <h1 class="title">🚀 AI Security Analyzer</h1>

    <textarea id="codeInput" placeholder="Paste your code here..."></textarea>

    <br><br>

    <button onclick="loadExample()">Load Example</button>
    <button onclick="scanCode()">Scan</button>

    <!-- LOADER -->
    <div id="loaderBar"></div>

    <!-- RESULT -->
    <div id="resultBox" class="card" style="display:none;">
        <h2 id="resultText"></h2>

        <p><b>Risk:</b> <span id="risk"></span>%</p>
        <p><b>Confidence:</b> <span id="confidence"></span>%</p>

        <pre id="codeOutput"></pre>
    </div>

    <!-- VULNERABILITIES -->
    <div class="card" id="vulnBox" style="display:none;">
        <h3>🚨 Detected Issues</h3>
        <ul id="vulnList"></ul>
    </div>

    <!-- FIXES -->
    <div class="card" id="fixBox" style="display:none;">
        <h3>🛠 Suggested Fixes</h3>
        <ul id="fixList"></ul>
    </div>

    <!-- GRAPH -->
    <div class="card" id="chartBox" style="display:none;">
        <canvas id="chart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
