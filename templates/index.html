<!DOCTYPE html>
<html>
<head>
<title>BlackBox Cyber SaaS</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<header>
<div class="logo">🛡 BlackBox AI</div>
<div class="status" id="status">Idle</div>
<a href="/logout" class="logout">Logout</a>
</header>

<section class="hero">
<h1>Find <span>Vulnerabilities</span><br>Before Hackers Do</h1>
<p>Paste your code and let BlackBox detect threats instantly.</p>
</section>

<div class="main">

<div class="left">

<div class="editor">
<div class="bar">source-code.ts</div>
<textarea id="code"></textarea>
</div>

<div class="actions">
<button onclick="loadExample()">Load Example</button>
<button class="primary" onclick="scan()">Run Scan</button>
</div>

</div>

<div class="right">

<div class="scorebox">
<canvas id="chart"></canvas>

<div class="sev">
<div><span id="critical">0</span> CRITICAL</div>
<div><span id="high">0</span> HIGH</div>
<div><span id="medium">0</span> MEDIUM</div>
<div><span id="low">0</span> LOW</div>
</div>

</div>

<div id="issues"></div>

</div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
