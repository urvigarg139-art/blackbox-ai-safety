<div id="chatBox" style="height:400px; overflow:auto; background:#000; padding:10px; color:white;"></div>

<input type="text" id="userInput" placeholder="Paste your code here..." style="width:80%;">
<button onclick="sendMessage()">Send</button>

<script>
async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value;

    const chatBox = document.getElementById("chatBox");

    // Show user message
    chatBox.innerHTML += `<div>👤 ${message}</div>`;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    });

    const data = await res.json();

    // Show ML result
    chatBox.innerHTML += `<div style="color:yellow;">⚠️ ${data.prediction} | Risk: ${data.risk}%</div>`;

    // Show AI explanation
    chatBox.innerHTML += `<div style="color:cyan;">🤖 ${data.reply}</div>`;

    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";
}
</script>
