<!DOCTYPE html>
<html>
<head>
    <title>AI Security Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { background:#0f172a; color:white; font-family:sans-serif; }
        .container { width:90%; margin:auto; }
        textarea { width:100%; height:120px; background:#020617; color:white; }
        button { margin:5px; padding:10px; background:#00ffd5; border:none; cursor:pointer; }
        #chatBox { height:250px; overflow:auto; background:#020617; padding:10px; }
        canvas { background:white; margin-top:20px; }
    </style>
</head>

<body>
<div class="container">

<h2>🤖 AI Security Assistant</h2>

<textarea id="codeInput" placeholder="Paste your code here..."></textarea><br>

<button onclick="loadExample()">Load Example</button>
<button onclick="scanCode()">Scan</button>

<!-- RESULT -->
<div id="result"></div>

<!-- GRAPH -->
<canvas id="chart"></canvas>

<!-- CHAT -->
<h3>💬 Ask AI</h3>
<div id="chatBox"></div>

<input id="userInput" placeholder="Ask about your code..." style="width:80%;">
<button onclick="sendMessage()">Send</button>

</div>

<script>
let lastCode = "";

function loadExample() {
    const example = "SELECT * FROM users WHERE id = '" + "' + user_input + '";
    document.getElementById("codeInput").value = example;
}

async function scanCode() {
    const code = document.getElementById("codeInput").value;
    lastCode = code;

    const res = await fetch("/scan", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code})
    });

    const data = await res.json();

    document.getElementById("result").innerHTML =
        `<h3>${data.prediction == 1 ? "⚠️ Vulnerable" : "✅ Safe"}</h3>
         Risk: ${data.risk.toFixed(2)}%`;

    new Chart(document.getElementById("chart"), {
        type: "bar",
        data: {
            labels: ["Risk", "Confidence"],
            datasets: [{
                label: "Analysis",
                data: [data.risk, data.confidence]
            }]
        }
    });
}

async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value;
    const chatBox = document.getElementById("chatBox");

    chatBox.innerHTML += `<div style="text-align:right;">👤 ${message}</div>`;

    const res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({code: lastCode, message})
    });

    const data = await res.json();

    chatBox.innerHTML += `
        <div style="color:yellow;">⚠️ ${data.prediction} (${data.risk}%)</div>
        <div style="color:#00ffff;">🤖 ${data.reply}</div>
    `;

    chatBox.scrollTop = chatBox.scrollHeight;
    input.value = "";
}
</script>

</body>
</html>
