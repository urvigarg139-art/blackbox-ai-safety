<!DOCTYPE html>
<html>
<head>
    <title>AI Security Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="main-container">

    <h1 class="title">🤖 AI Security Assistant</h1>

    <!-- INPUT -->
    <textarea id="codeInput" placeholder="Paste your code here..."></textarea>

    <br><br>

    <button onclick="loadExample()">Load Example</button>
    <button onclick="scanCode()">Scan</button>

    <!-- LOADING -->
    <div id="loading" style="display:none; margin-top:20px;">
        🤖 AI is analyzing your code...
    </div>

    <!-- RESULT -->
    <div id="resultBox" class="card" style="display:none; margin-top:20px;">
        <h2 id="resultText"></h2>

        <p><b>Risk:</b> <span id="risk"></span>%</p>
        <p><b>Confidence:</b> <span id="confidence"></span>%</p>

        <pre id="codeOutput"></pre>

        <div class="ai-box" id="suggestion"></div>

        <canvas id="chart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
