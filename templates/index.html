<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BlackBox AI</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="grid">

<header>
<h2>🛡 BlackBox AI</h2>
<div>
Logged in as: {{ user }}
<a href="/logout"><button class="ghost">Logout</button></a>
</div>
</header>

<section class="hero">
<h1>Find Vulnerabilities<br><span>Before Hackers Do</span></h1>
</section>

<div class="container">

<div class="scanbar"></div>

<pre><code contenteditable="true" id="input"></code></pre>

<div style="margin-top:15px">
<button onclick="runAudit()">Run Audit</button>
<button class="ghost" onclick="loadExample()">Load Example</button>
<a href="/download"><button class="ghost">Download Report</button></a>
</div>

<div class="progress">
<div id="progressFill"></div>
</div>

<div class="dash">
<div class="score">
<div id="scoreVal">0</div>
<span>/100</span>
</div>

<div class="stats">
<div class="box red" id="critical">0 🔴 CRITICAL</div>
<div class="box green" id="low">0 🟢 LOW</div>
</div>
</div>

<div id="issues"></div>
<div id="history"></div>

</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
