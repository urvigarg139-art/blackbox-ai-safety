<!DOCTYPE html>
<html>
<head>
    <title>AI Security Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚡ BlackBox AI</h2>

        <div class="menu">
            <div class="menu-item active" id="scanTab">🧠 Scan</div>
            <div class="menu-item" id="historyBtn">📊 History</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>🚀 AI Security Analyzer</h1>

        <textarea id="codeInput"></textarea>

        <div class="btn-group">
            <button id="exampleBtn">Load Example</button>
            <button id="scanBtn">Scan</button>
            <button id="downloadBtn">Download Report</button>
            
        </div>

        <div id="loader">🤖 AI analyzing...</div>

        <!-- RESULT -->
        <div id="result" class="cards">

            <div class="card">
                <h3>Status</h3>
                <p id="label"></p>
            </div>

            <div class="card">
                <h3>Risk</h3>
                <p id="risk"></p>
            </div>

            <div class="card">
                <h3>Confidence</h3>
                <p id="confidence"></p>
            </div>

            <div class="card">
                <h3>Fix Suggestion</h3>
                <p id="fix"></p>
            </div>

        </div>

        <!-- CHART -->
        <canvas id="chart"></canvas>

        <!-- HISTORY PANEL -->
        <div id="historyPanel" style="display:none;">
            <h2>📊 Scan History</h2>
            <div id="historyList"></div>
        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
