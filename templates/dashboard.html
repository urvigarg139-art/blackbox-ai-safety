<!DOCTYPE html>
<html>
<head>
    <title>AI Security Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
<div class="main-container">

    <!-- 🔹 SIDEBAR -->
    <div class="sidebar">

        <h2>⚡ BlackBox AI</h2>

        <!-- USER PROFILE -->
        <div class="user-profile">
            <img src="/static/default-avatar.png" class="avatar" id="userAvatar">
            <span id="username">Guest</span>
        </div>

        <!-- MENU -->
        <div class="menu">
            <button onclick="showScan()">🧠 Scan</button>
            <button onclick="toggleHistory()">📊 History</button>
        </div>

        <!-- HISTORY PANEL -->
        <div class="history-panel" id="historyPanel">
            <h3>History</h3>
            <div id="historyList"></div>
        </div>

    </div>


    <!-- 🔹 MAIN CONTENT -->
    <div class="main-content" id="mainContent">

        <h1>🚀 AI Security Analyzer</h1>

        <!-- YOUR EXISTING SCAN UI HERE -->
        <textarea id="inputBox" placeholder="Paste code here..."></textarea>
        <button onclick="sendMessage()">Analyze</button>

    </div>

</div>

        <!-- RESULT -->
        <div id="result" class="cards">

            <div class="card">
                <h3>Status</h3>
                <p id="label"></p>
            </div>

            <div class="card">
                <h3>Risk</h3>
                <p id="risk"></p>
            </div>

            <div class="card">
                <h3>Confidence</h3>
                <p id="confidence"></p>
            </div>

            <div class="card">
                <h3>Fix Suggestion</h3>
                <p id="fix"></p>
            </div>

        </div>

        <!-- CHART -->
        <canvas id="chart"></canvas>

        <!-- HISTORY PANEL -->
        <div id="historyPanel" style="display:none;">
            <h2>📊 Scan History</h2>
            <div id="historyList"></div>
        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
