<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1 class="glow">⚡ AI Security Dashboard</h1>

<div class="card">
    <h2>{{ result }}</h2>
    <p>🔥 Risk Score: <b>{{ risk_score }}%</b></p>
    <p>📊 Confidence: <b>{{ confidence }}%</b></p>
    <p>🧠 {{ explanation }}</p>
</div>

<div class="grid">

    <div class="card chart-box">
        <canvas id="riskChart"></canvas>
    </div>

    <div class="card chart-box">
        <canvas id="confidenceChart"></canvas>
    </div>

</div>

<div class="card">
    <a href="/">🔁 Scan Again</a> |
    <a href="/logout">Logout</a>
</div>

</div>

<script>
const risk = parseInt("{{ risk_score }}");
const safe = 100 - risk;
const confidence = parseInt("{{ confidence }}");

new Chart(document.getElementById("riskChart"), {
    type: 'doughnut',
    data: {
        labels: ['Risk','Safe'],
        datasets: [{
            data: [risk, safe],
            backgroundColor: ['#ff004c','#00ffcc']
        }]
    },
    options: {
        plugins: {
            legend: { labels: { color: "#00ffcc" } }
        }
    }
});

new Chart(document.getElementById("confidenceChart"), {
    type: 'bar',
    data: {
        labels: ['Confidence'],
        datasets: [{
            data: [confidence],
            backgroundColor: '#00ffcc'
        }]
    },
    options: {
        scales: {
            y: { ticks: { color: "#00ffcc" } },
            x: { ticks: { color: "#00ffcc" } }
        }
    }
});
</script>

</body>
</html>
