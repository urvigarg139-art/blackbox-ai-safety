<!DOCTYPE html>
<html>
<head>
    <title>AI Security Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="app">

<div class="sidebar">
    <h2>⚡ BlackBox AI</h2>
    <div class="menu">
        <div class="menu-item active">🧠 Scan</div>
        <div class="menu-item">📊 History</div>
        <div class="menu-item">⚙ Settings</div>
    </div>
</div>

<div class="main">

<h1>🚀 AI Security Analyzer</h1>

<textarea id="codeInput"></textarea>

<div class="btn-group">
    <button id="exampleBtn">Load Example</button>
    <button id="scanBtn">Scan</button>
    <button id="downloadBtn">Download Report</button>
</div>

<div id="loader">🤖 AI analyzing...</div>

<div id="result" class="cards">

<div class="card">
<h3>Status</h3>
<p id="label"></p>
</div>

<div class="card">
<h3>Risk</h3>
<p id="risk"></p>
</div>

<div class="card">
<h3>Confidence</h3>
<p id="confidence"></p>
</div>

<div class="card">
<h3>Fix Suggestion</h3>
<p id="fix"></p>
</div>

</div>

<canvas id="chart" width="400" height="200"></canvas>

</div>
</div>
<!-- VULNERABILITY TAGS -->
<div class="card" id="tagsBox" style="display:none;">
    <h3>🚨 Detected Issues</h3>
    <div id="tags"></div>
</div>

<!-- HISTORY -->
<div class="card">
    <h3>📊 Recent Scans</h3>
    <ul id="history">
        <li>Login API → Safe</li>
        <li>Payment Module → Vulnerable</li>
        <li>User Auth → Safe</li>
    </ul>
</div>
<script src="/static/js/app.js"></script>
</body>
</html>
