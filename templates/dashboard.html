<!DOCTYPE html>
<html>
<head>
    <title>AI Security Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🛡️ SecureAI</h2>
        <ul>
            <li>📊 Dashboard</li>
            <li>🔍 Scan</li>
            <li>📁 History</li>
            <li>⚙ Settings</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>🚀 AI Security Analyzer</h1>

        <!-- INPUT -->
        <div class="card">
            <textarea id="code" placeholder="Paste your code here..."></textarea>

            <div class="btn-group">
                <button onclick="loadExample()">Load Example</button>
                <button onclick="scanCode()">Scan</button>
            </div>
        </div>

        <!-- LOADING -->
        <div id="loading" class="loading hidden">🤖 AI is analyzing...</div>

        <!-- RESULT -->
        <div id="result" class="hidden">

            <!-- SUMMARY -->
            <div class="grid">

                <div class="card">
                    <h3>⚠ Vulnerability</h3>
                    <p id="label"></p>
                </div>

                <div class="card">
                    <h3>📉 Risk</h3>
                    <div class="progress">
                        <div id="riskBar"></div>
                    </div>
                    <p id="risk"></p>
                </div>

                <div class="card">
                    <h3>🎯 Confidence</h3>
                    <div class="progress blue">
                        <div id="confBar"></div>
                    </div>
                    <p id="confidence"></p>
                </div>

            </div>

            <!-- CHART -->
            <div class="card">
                <canvas id="chart"></canvas>
            </div>

            <!-- EXPLANATION -->
            <div class="card">
                <h3>🧠 Why is this vulnerable?</h3>
                <p id="reason"></p>
            </div>

            <!-- FIX -->
            <div class="card">
                <h3>🛠 Suggested Fix</h3>
                <pre id="fix"></pre>
            </div>

        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
