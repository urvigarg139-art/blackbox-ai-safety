<!DOCTYPE html>
<html>
<head>
    <title>AI Security Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚡ BlackBox AI</h2>
        <div class="menu">
            <div class="menu-item active">🧠 Scan</div>
            <div class="menu-item">📊 History</div>
            <div class="menu-item">⚙ Settings</div>
            <div class="menu-item">🚨 Threat DB</div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>🚀 AI Security Analyzer</h1>

        <textarea id="codeInput" placeholder="Paste your code here..."></textarea>

        <div class="btn-group">
            <button id="exampleBtn">Load Example</button>
            <button id="scanBtn">Scan</button>
        </div>

        <!-- LOADER -->
        <div id="loader" class="loader">
            🤖 AI is thinking...
        </div>

        <!-- RESULT CARDS -->
        <div id="result" class="cards">

            <div class="card">
                <h3>Status</h3>
                <p id="label"></p>
            </div>

            <div class="card">
                <h3>Risk</h3>
                <p id="risk"></p>
            </div>

            <div class="card">
                <h3>Confidence</h3>
                <p id="confidence"></p>
            </div>

        </div>

    </div>

</div>

<script src="/static/js/app.js"></script>

</body>
</html>
