<!DOCTYPE html>
<html>
<head>
    <title>AI Security Analyzer</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="main-container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>⚡ BlackBox AI</h2>

        <div class="user-profile">
            <img src="/static/default-avatar.png" class="avatar">
            <span>{{ username }}</span>
        </div>

       <div class="menu">
    <button onclick="newScan()">➕ New Scan</button>
    <button onclick="showScan()">🧠 Scan</button>
    <button onclick="toggleHistory()">📊 History</button>
    <button onclick="clearHistory()">🗑 Clear</button>
    <a href="/logout"><button>🚪 Logout</button></a>
</div>

        <div class="history-panel" id="historyPanel">
            <h3>History</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main-content">

        <h1>🚀 AI Security Analyzer</h1>

        <div class="analyzer-box">
            <textarea id="inputBox"></textarea>

            <div class="buttons">
                <button onclick="loadExample()">Load Example</button>
                <button onclick="sendMessage()">Scan</button>
                <button onclick="downloadReport()">Download Report</button>
            </div>
        </div>

        <div id="result" class="cards">
            <div class="card"><h3>Status</h3><p id="label"></p></div>
            <div class="card"><h3>Risk</h3><p id="risk"></p></div>
            <div class="card"><h3>Confidence</h3><p id="confidence"></p></div>
            <div class="card"><h3>Fix</h3><p id="fix"></p></div>
        </div>

        <canvas id="chart"></canvas>

    </div>

</div>

<script src="/static/js/app.js"></script>
</body>
</html>
