<!DOCTYPE html>
<html>
<head>
    <title>AI Security Analyzer</title>

    <!-- FIXED PATHS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>🛡 SecureAI</h2>
        <ul>
            <li>Dashboard</li>
            <li>Scan</li>
            <li>History</li>
            <li>Reports</li>
        </ul>
    </div>

    <!-- MAIN -->
    <div class="main">

        <h1>🚀 AI Security Analyzer</h1>

        <textarea id="code"></textarea>

        <br><br>

        <button onclick="loadExample()">Load Example</button>
        <button onclick="scanCode()">Scan</button>

        <div id="loading" style="display:none;">Scanning...</div>

        <div id="result" style="display:none;">
            <h2 id="label"></h2>
            <p id="risk"></p>
            <p id="confidence"></p>
        </div>

    </div>

</div>

<!-- FIXED JS PATH -->
<script src="{{ url_for('static', filename='js/app.js') }}"></script>

</body>
</html>
