<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <h1>📊 Scan Result</h1>

    <p><b>Result:</b> {{ result }}</p>
    <p><b>Risk Score:</b> {{ risk_score }}%</p>
    <p><b>Explanation:</b> {{ explanation }}</p>

    <canvas id="riskChart"></canvas>

    <script>
    const riskScore = parseInt("{{ risk_score }}");
    const safeScore = 100 - riskScore;

    const ctx = document.getElementById('riskChart').getContext('2d');

    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Risk', 'Safe'],
            datasets: [{
                data: [riskScore, safeScore],
                backgroundColor: ['#ff004c', '#00ffcc']
            }]
        }
    });
    </script>

    <br>
    <a href="/">🔁 Scan Again</a>
</body>
</html>
