<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>📊 Analysis Dashboard</h1>

    <div class="card">
        <h3>{{ result }}</h3>
        <p>Risk: {{ risk }}%</p>
        <p>Confidence: {{ confidence }}%</p>
    </div>

    <div class="card">
        <h3>Code</h3>
        <pre id="codeDisplay">{{ code }}</pre>
    </div>

    <!-- CHAT -->
    <div class="chat">
        <h3>💬 Ask AI</h3>

        <div id="chatBox"></div>

        <input id="chatInput" placeholder="Ask about your code..." />
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
